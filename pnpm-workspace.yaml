packages:
  - apps/*
  - packages/*

minimumReleaseAge: 7200 # 5 days, in minutes
# Temporarily exclude vite for security patches
minimumReleaseAgeExclude:
  - vite
  - rolldown
trustPolicy: no-downgrade

overrides:
  # Remove deprecated node-domexception - Node.js 18+ has native DOMException
  node-domexception: '-'
  # Fix minimatch ReDoS vulnerabilities in the Vercel build chain
  minimatch: '>=10.2.5'
  # Fix ajv ReDoS vulnerability in Vercel static config
  ajv: '>=8.18.0'
  # Fix path-to-regexp ReDoS vulnerability (backtracking regex)
  path-to-regexp@>=4.0.0 <6.3.0: '>=8.4.2'
  # Fix undici decompression chain DoS vulnerability
  undici: '>=8.0.2'
  # Fix chokidar trust issue - use v5 with Trusted Publishing instead of v4 without provenance
  chokidar: '^5.0.0'
  # Fix tar path traversal vulnerability (CVE-2026-31802) in sanity export
  tar: '>=7.5.13'
  # Fix semver trust downgrade - use v7 with provenance instead of v6 without
  semver: '>=7.7.4'
  # Fix reselect trust downgrade - pin to specific version
  reselect: '5.1.1'
  # Fix Vite vulnerabilities in transitive dependencies (e.g., from Sanity)
  vite: '8.0.10'
  # Fix js-yaml prototype pollution (GHSA-mh29-5h37-fv8m) in sanity cli
  js-yaml: '>=3.14.2'
  # Fix smol-toml DoS (GHSA-v3rj-xjv7-4jmq) in vercel python-analysis
  smol-toml: '>=1.6.1'

# Suppress warnings for deprecated packages we can't fix (upstream issues)
allowedDeprecatedVersions:
  # sanity@5.13.0 still pulls glob@10.5.0 via archiver/rimraf; track upstream instead of forcing a major transitive override
  glob: '*'
  # whatwg-encoding is deprecated but @exodus/bytes isn't API-compatible
  # jsdom 27.4.0+ uses @exodus/bytes directly, but jsdom 26.1.0 (from sanity) still needs whatwg-encoding
  # Upstream fix: upgrade jsdom or wait for sanity to upgrade jsdom
  whatwg-encoding: '*'
